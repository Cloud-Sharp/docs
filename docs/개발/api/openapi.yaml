openapi: 3.0.3
info:
  title: CloudSharp API Draft
  version: 0.2.0-draft
  description: |
    기능 요구사항과 설계 문서를 기준으로 정리한 CloudSharp MVP API 초안이다.
    내부 인증 API는 `/api/v1`, 외부 공개 API는 `/public/v1` 경로를 사용한다.
servers:
  - url: /
    description: Site root
security:
  - bearerAuth: []
x-tagGroups:
  - name: Identity
    tags:
      - Auth
      - Users
  - name: Collaboration
    tags:
      - Spaces
      - Invites
      - Members
  - name: Content
    tags:
      - Folders
      - Files
      - Search
      - Preview
      - Trash
      - UploadSessions
      - Downloads
  - name: Sharing
    tags:
      - Share Links
      - Public Share
  - name: Operations
    tags:
      - Health
      - Admin
      - Events
      - Uploads
      - Internal Uploads
      - TusdHooks
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Spaces
  - name: Invites
  - name: Members
  - name: Folders
  - name: Files
  - name: Search
  - name: Preview
  - name: Trash
  - name: UploadSessions
  - name: Downloads
  - name: Share Links
  - name: Public Share
  - name: Admin
  - name: Events
  - name: Uploads
  - name: Internal Uploads
  - name: TusdHooks
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
    internalUploadToken:
      type: apiKey
      in: header
      name: X-CloudSharp-Internal-Token
      description: 내부 업로드 finalize 전용 토큰
  parameters:
    spaceSlug:
      name: spaceSlug
      in: path
      required: true
      description: URL 접근에 사용하는 Space slug
      schema:
        type: string
      example: my-space
    folderId:
      name: folderId
      in: path
      required: true
      description: 폴더 식별자. 루트 폴더는 `root` 사용
      schema:
        type: string
    fileId:
      name: fileId
      in: path
      required: true
      description: 파일 식별자
      schema:
        type: string
    memberId:
      name: memberId
      in: path
      required: true
      description: Space 멤버 식별자
      schema:
        type: string
    inviteToken:
      name: inviteToken
      in: path
      required: true
      description: 초대 링크 토큰 원문
      schema:
        type: string
    shareLinkId:
      name: shareLinkId
      in: path
      required: true
      description: 공유 링크 식별자
      schema:
        type: string
    uploadSessionToken:
      name: token
      in: path
      required: true
      description: 업로드 세션 토큰
      schema:
        type: string
    sessionToken:
      name: sessionToken
      in: path
      required: true
      description: 다운로드 세션 토큰
      schema:
        type: string
    shareToken:
      name: shareToken
      in: path
      required: true
      description: 외부 공유 토큰
      schema:
        type: string
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    spacePageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    sortDir:
      name: sortDir
      in: query
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    q:
      name: q
      in: query
      required: true
      description: 검색어. 현재 구현은 공백 제거 후 1자 이상, 최대 200자까지 허용한다.
      schema:
        type: string
        maxLength: 200
  schemas:
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        reason:
          type: string
      required:
        - reason
    ErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
      required:
        - code
        - message
    ErrorResponse:
      type: object
      properties:
        requestId:
          type: string
        error:
          $ref: '#/components/schemas/ErrorBody'
      required:
        - error
    PageInfo:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer
      required:
        - page
        - pageSize
        - totalItems
        - totalPages
    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        systemRole:
          type: string
          enum:
            - ADMIN
            - USER
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - systemRole
        - createdAt
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          maxLength: 20
        displayName:
          type: string
          maxLength: 100
        password:
          type: string
          format: password
          maxLength: 128
      required:
        - email
        - username
        - displayName
        - password
    LoginRequest:
      type: object
      properties:
        loginId:
          type: string
          format: email
        password:
          type: string
          format: password
      required:
        - loginId
        - password
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: Redis UserSession에 대응되는 opaque session token
          example: cs_sess_8eM3S1Qj6c7Yg4nM5gV1y7uQvC8sYxk9lW0aB2cD3eF
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
        user:
          $ref: '#/components/schemas/UserProfile'
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
        - user
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    SpaceSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Space 리소스 식별자. bigint
          example: 123
        name:
          type: string
        role:
          type: string
          enum:
            - OWNER
            - ADMIN
            - MEMBER
            - VIEWER
        status:
          type: string
          enum:
            - ACTIVE
            - ARCHIVED
            - DELETED
        storageAllowedBytes:
          type: integer
          nullable: true
        storageUsedBytes:
          type: integer
        storageReservedBytes:
          type: integer
        createdAt:
          type: string
          format: date-time
        slug:
          type: string
          description: URL path 접근에 사용하는 Space slug
          example: my-space
        ownerUserId:
          type: integer
          format: int64
          description: Space 소유자 사용자 식별자. bigint
          example: 456
      required:
        - id
        - name
        - role
        - status
        - storageUsedBytes
        - storageReservedBytes
        - createdAt
        - slug
        - ownerUserId
    SpaceDetail:
      allOf:
        - $ref: '#/components/schemas/SpaceSummary'
        - type: object
          properties:
            slug:
              type: string
              description: URL path 접근에 사용하는 Space slug
              example: my-space
            ownerUserId:
              type: integer
              format: int64
              description: Space 소유자 사용자 식별자. bigint
              example: 456
    SpaceListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SpaceSummary'
        page:
          $ref: '#/components/schemas/PageInfo'
      required:
        - items
        - page
    CreateSpaceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        storageAllowedBytes:
          type: integer
          nullable: true
      required:
        - name
    UpdateSpaceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
    QuotaSummary:
      type: object
      properties:
        spaceId:
          type: integer
          format: int64
          description: 외부 응답에 노출되는 Space 식별자. bigint
          example: 123
        storageAllowedBytes:
          type: integer
          nullable: true
        storageUsedBytes:
          type: integer
        storageReservedBytes:
          type: integer
        availableBytes:
          type: integer
          nullable: true
        usageRate:
          type: number
          format: float
      required:
        - spaceId
        - storageUsedBytes
        - storageReservedBytes
        - usageRate
    UpdateQuotaRequest:
      type: object
      properties:
        storageAllowedBytes:
          type: integer
          nullable: true
      required:
        - storageAllowedBytes
    Invite:
      type: object
      properties:
        id:
          type: integer
          format: int64
        spaceId:
          type: integer
          format: int64
          description: 외부 응답에 노출되는 Space 식별자. bigint
          example: 123
        inviterUserId:
          type: integer
          format: int64
        inviteToken:
          type: string
          nullable: true
          description: 생성 응답에서만 반환된다. 관리용 조회에서는 null 또는 미포함.
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - spaceId
        - inviterUserId
        - isExpired
        - createdAt
        - updatedAt
    InviteListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Invite'
      required:
        - items
    InvitePreview:
      type: object
      properties:
        inviteId:
          type: integer
          format: int64
        spaceId:
          type: integer
          format: int64
        spaceSlug:
          type: string
        spaceName:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isExpired:
          type: boolean
        alreadyMember:
          type: boolean
        roleOnAccept:
          type: string
          enum:
            - VIEWER
      required:
        - inviteId
        - spaceId
        - spaceSlug
        - spaceName
        - isExpired
        - alreadyMember
        - roleOnAccept
    CreateInviteRequest:
      type: object
      properties:
        expiresAt:
          type: string
          format: date-time
          nullable: true
    AcceptInviteRequest:
      type: object
      properties:
        inviteToken:
          type: string
      required:
        - inviteToken
    SpaceMember:
      type: object
      properties:
        memberId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - OWNER
            - ADMIN
            - MEMBER
            - VIEWER
        status:
          type: string
          enum:
            - ACTIVE
            - INVITED
            - SUSPENDED
            - LEFT
        joinedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - memberId
        - userId
        - email
        - role
        - status
    SpaceMemberListResponse:
      type: array
      items:
        $ref: '#/components/schemas/SpaceMember'
    UpdateMemberRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum:
            - ADMIN
            - MEMBER
            - VIEWER
      required:
        - role
    FolderResource:
      type: object
      properties:
        id:
          type: string
        spaceId:
          type: integer
          format: int64
          description: 외부 응답에 노출되는 Space 식별자. bigint
          example: 123
        parentFolderId:
          type: string
          nullable: true
        name:
          type: string
        fullPath:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - spaceId
        - name
        - createdAt
        - updatedAt
    FolderNode:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - FOLDER
            - FILE
        name:
          type: string
        parentFolderId:
          type: string
          nullable: true
        sizeBytes:
          type: integer
          nullable: true
        mimeType:
          type: string
          nullable: true
        fileStatus:
          type: string
          nullable: true
        previewStatus:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - name
        - updatedAt
    FolderChildrenResponse:
      type: object
      properties:
        spaceId:
          type: integer
          format: int64
          description: 외부 응답에 노출되는 Space 식별자. bigint
          example: 123
        folderId:
          type: string
        folderName:
          type: string
        parentFolderId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/FolderNode'
        page:
          $ref: '#/components/schemas/PageInfo'
      required:
        - spaceId
        - folderId
        - folderName
        - items
        - page
    CreateFolderRequest:
      type: object
      properties:
        parentFolderId:
          type: string
          nullable: true
        name:
          type: string
      required:
        - name
    UpdateFolderRequest:
      type: object
      properties:
        name:
          type: string
        parentFolderId:
          type: string
          nullable: true
    SearchResponse:
      type: object
      properties:
        q:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/FolderNode'
        page:
          $ref: '#/components/schemas/PageInfo'
      required:
        - q
        - items
        - page
    FileResource:
      type: object
      properties:
        id:
          type: string
        spaceId:
          type: integer
          format: int64
          description: 외부 응답에 노출되는 Space 식별자. bigint
          example: 123
        folderId:
          type: string
        displayName:
          type: string
        sizeBytes:
          type: integer
        mimeType:
          type: string
          nullable: true
        checksumSha256:
          type: string
          nullable: true
        fileStatus:
          type: string
          enum:
            - ACTIVE
            - DELETED
            - CORRUPTED
            - QUARANTINED
        previewStatus:
          type: string
          enum:
            - PENDING
            - PROCESSING
            - DONE
            - FAILED
            - UNSUPPORTED
        scanStatus:
          type: string
          enum:
            - PENDING
            - PASSED
            - FAILED
            - QUARANTINED
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - spaceId
        - folderId
        - displayName
        - sizeBytes
        - mimeType
        - checksumSha256
        - fileStatus
        - previewStatus
        - scanStatus
        - createdAt
        - updatedAt
    TrashFileItem:
      type: object
      properties:
        id:
          type: string
        spaceId:
          type: integer
          format: int64
          description: 외부 응답에 노출되는 Space 식별자. bigint
          example: 123
        folderId:
          type: string
        displayName:
          type: string
        sizeBytes:
          type: integer
        mimeType:
          type: string
          nullable: true
        fileStatus:
          type: string
          enum:
            - DELETED
        deletedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - spaceId
        - folderId
        - displayName
        - sizeBytes
        - fileStatus
        - deletedAt
        - updatedAt
    TrashFilesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TrashFileItem'
        page:
          $ref: '#/components/schemas/PageInfo'
      required:
        - items
        - page
    RestoreTrashFileRequest:
      type: object
      properties:
        targetFolderId:
          type: string
          nullable: true
    UpdateFileRequest:
      type: object
      properties:
        name:
          type: string
        parentFolderId:
          type: string
          nullable: true
    CreateUploadSessionRequest:
      type: object
      properties:
        targetFolderId:
          type: integer
          format: int64
          minimum: 1
          description: 업로드 대상 폴더 ID
        originalName:
          type: string
          maxLength: 255
          description: 원본 파일명
        expectedSize:
          type: integer
          format: int64
          minimum: 1
          description: 예상 파일 크기
        clientMimeType:
          type: string
          maxLength: 255
          nullable: true
        checksum:
          type: string
          maxLength: 64
          nullable: true
      required:
        - targetFolderId
        - originalName
        - expectedSize
    CreateUploadSessionResponse:
      type: object
      properties:
        token:
          type: string
        status:
          type: string
          enum:
            - CREATED
            - UPLOADING
            - FINALIZING
            - COMPLETED
            - FAILED
            - ABORTED
            - EXPIRED
        requesterUserId:
          type: integer
          format: int64
        targetFolderId:
          type: integer
          format: int64
        originalName:
          type: string
        expectedSize:
          type: integer
          format: int64
        receivedSize:
          type: integer
          format: int64
        tempStorageKey:
          type: string
          nullable: true
        tusUploadId:
          type: string
          nullable: true
        fileItemId:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        fileReservationItem:
          $ref: '#/components/schemas/FileReservationItemResponse'
      required:
        - token
        - status
        - requesterUserId
        - targetFolderId
        - originalName
        - expectedSize
        - receivedSize
        - createdAt
        - fileReservationItem
    FileReservationItemResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - RESERVED
            - ACTIVE
            - CONSUMED
            - CANCELLED
            - EXPIRED
            - FAILED
        spaceId:
          type: integer
          format: int64
        targetFolderId:
          type: integer
          format: int64
        reservedName:
          type: string
        reservedBytes:
          type: integer
          format: int64
        isReserved:
          type: boolean
        fileItemId:
          type: integer
          format: int64
          nullable: true
        expiresAt:
          type: string
          format: date-time
      required:
        - status
        - spaceId
        - targetFolderId
        - reservedName
        - reservedBytes
        - isReserved
        - expiresAt
    CompleteUploadResult:
      type: object
      properties:
        fileItem:
          $ref: '#/components/schemas/FolderNode'
      required:
        - fileItem
    MarkUploadSessionUploadingRequest:
      type: object
      properties:
        tusUploadId:
          type: string
        receivedSizeBytes:
          type: integer
          format: int64
          nullable: true
      required:
        - tusUploadId
    CompleteUploadRequest:
      type: object
      properties:
        tusUploadId:
          type: string
        finalSizeBytes:
          type: integer
          format: int64
        clientMimeType:
          type: string
          nullable: true
        tempStorageKey:
          type: string
          nullable: true
      required:
        - tusUploadId
        - finalSizeBytes
    TusdHookRequest:
      type: object
      properties:
        type:
          type: string
          enum:
            - pre-create
            - post-create
            - post-receive
            - post-finish
        event:
          $ref: '#/components/schemas/TusdHookEvent'
      required:
        - type
        - event
    TusdHookEvent:
      type: object
      properties:
        upload:
          $ref: '#/components/schemas/TusdUpload'
        httpRequest:
          $ref: '#/components/schemas/TusdHttpRequest'
      required:
        - upload
        - httpRequest
    TusdUpload:
      type: object
      properties:
        id:
          type: string
          nullable: true
        size:
          type: integer
          format: int64
          nullable: true
        sizeIsDeferred:
          type: boolean
        offset:
          type: integer
          format: int64
        metadata:
          type: object
          additionalProperties:
            type: string
        isPartial:
          type: boolean
        isFinal:
          type: boolean
        partialUploads:
          type: array
          nullable: true
          items:
            type: string
        storage:
          $ref: '#/components/schemas/TusdStorage'
      required:
        - offset
        - metadata
    TusdStorage:
      type: object
      nullable: true
      properties:
        type:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        infoPath:
          type: string
          nullable: true
        bucket:
          type: string
          nullable: true
        key:
          type: string
          nullable: true
    TusdHttpRequest:
      type: object
      properties:
        method:
          type: string
        uri:
          type: string
        remoteAddr:
          type: string
        header:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required:
        - header
    TusdHookResponse:
      type: object
      properties:
        HTTPResponse:
          $ref: '#/components/schemas/TusdHttpResponse'
        RejectUpload:
          type: boolean
          nullable: true
        RejectTermination:
          type: boolean
          nullable: true
        ChangeFileInfo:
          $ref: '#/components/schemas/TusdChangeFileInfo'
        StopUpload:
          type: boolean
          nullable: true
    TusdHttpResponse:
      type: object
      nullable: true
      properties:
        StatusCode:
          type: integer
        Body:
          type: string
          nullable: true
        Header:
          type: object
          additionalProperties:
            type: string
      required:
        - StatusCode
        - Header
    TusdChangeFileInfo:
      type: object
      nullable: true
      properties:
        ID:
          type: string
          nullable: true
        MetaData:
          type: object
          nullable: true
          additionalProperties:
            type: string
        Storage:
          $ref: '#/components/schemas/ResponseTusdStorage'
    ResponseTusdStorage:
      type: object
      nullable: true
      properties:
        Path:
          type: string
      required:
        - Path
    DownloadSessionResponse:
      type: object
      properties:
        downloadUrl:
          type: string
        expiresAt:
          type: string
