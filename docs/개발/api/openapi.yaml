    RealtimeEventEnvelope:
      type: object
      description: |
        SSE `data`에 들어가는 공통 이벤트 envelope. SSE `event` 이름은 `eventType`과 동일하다.
        `payload`는 `eventType`별 schema 중 하나다.
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          enum:
            - SpaceCreated
            - SpaceUpdated
            - SpaceQuotaChanged
            - SpaceDeleted
            - MemberAdded
            - MemberRemoved
            - MemberRoleChanged
            - SpaceInviteCreated
            - SpaceInviteRevoked
            - SpaceInviteAccepted
            - FileUploaded
            - UploadFinalizeFailed
            - FileRenamed
            - FileMoved
            - FileDeleted
            - FolderCreated
            - FolderRenamed
            - FolderMoved
            - FolderDeleted
            - ShareLinkCreated
            - ShareLinkUpdated
            - ShareLinkRevoked
        eventVersion:
          type: integer
          example: 1
        occurredAt:
          type: string
          format: date-time
        spaceId:
          type: integer
          format: int64
          nullable: true
        actorUserId:
          type: integer
          format: int64
          nullable: true
        aggregateType:
          type: string
          nullable: true
          enum:
            - Space
            - SpaceMember
            - SpaceInvite
            - FileItem
            - Folder
            - ShareLink
            - UploadSession
        aggregateId:
          type: integer
          format: int64
          nullable: true
        payload:
          oneOf:
            - $ref: '#/components/schemas/RealtimeSpaceEventPayload'
            - $ref: '#/components/schemas/RealtimeSpaceQuotaChangedPayload'
            - $ref: '#/components/schemas/RealtimeMemberEventPayload'
            - $ref: '#/components/schemas/RealtimeSpaceInviteEventPayload'
            - $ref: '#/components/schemas/RealtimeSpaceInviteAcceptedPayload'
            - $ref: '#/components/schemas/RealtimeFileEventPayload'
            - $ref: '#/components/schemas/RealtimeUploadFinalizeFailedPayload'
            - $ref: '#/components/schemas/RealtimeFolderEventPayload'
            - $ref: '#/components/schemas/RealtimeShareLinkEventPayload'
      required:
        - eventId
        - eventType
        - eventVersion
        - occurredAt
        - payload
